name: Build Czas Client

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Download Gradle
      run: |
        curl -L https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -o gradle.zip
        unzip gradle.zip
        mv gradle-8.1.1 gradle
    - name: Build with Gradle
      run: ./gradle/bin/gradle shadowJar --no-daemon --stacktrace
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CzasClient-${{ github.run_number }}
        path: build/libs/CzasClient.jar
